apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: Backend Deploy

on:
  workflow_call:
    inputs:
      artifact-id:
        type: string
        required: true
        description: "Docker image tag (Git SHA) to deploy"
      environment:
        type: string
        required: true
        description: "Target environment (dev, staging, prod)"
    secrets:
      DOCKERHUB_USERNAME:
        required: true

jobs:
  deploy-backend:
    env:
      IMAGE_TAG: ${{ inputs.artifact-id }}
      ENVIRONMENT: ${{ inputs.environment }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      GKE_CLUSTER: unifyintegration
      GKE_ZONE: us-east1-b
      GKE_PROJECT: unify-enterprise-reference

    steps:
      - name: Checkout infra repo
        uses: cloudbees-io/checkout@v1
        with:
          repository: dnarlakanti-IN-297/ecommerce-infra
          ref: main

      - name: Configure GKE credentials
        uses: cloudbees-io/configure-gke-credentials@v1
        with:
          cluster-name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_ZONE }}
          project-id: ${{ env.GKE_PROJECT }}

      - name: Determine namespace
        uses: docker://alpine:latest
        shell: sh
        run: |
          case "$ENVIRONMENT" in
            dev)
              NAMESPACE="ecommerce-dev"
              ;;
            staging)
              NAMESPACE="ecommerce-staging"
              ;;
            prod)
              NAMESPACE="ecommerce-prod"
              ;;
            *)
              echo "❌ Unknown environment: $ENVIRONMENT"
              exit 1
              ;;
          esac

          echo "NAMESPACE=$NAMESPACE" >> $CLOUDBEES_OUTPUTS/namespace
          echo "✅ Deploying backend to namespace: $NAMESPACE"

      - name: Create namespace if not exists
        uses: docker://google/cloud-sdk:alpine
        shell: sh
        run: |
          NAMESPACE=$(cat $CLOUDBEES_OUTPUTS/namespace)
          kubectl get namespace $NAMESPACE || kubectl create namespace $NAMESPACE
          echo "✅ Namespace $NAMESPACE ready"

      - name: Deploy backend with Helm
        uses: docker://alpine/helm:latest
        shell: sh
        run: |
          NAMESPACE=$(cat $CLOUDBEES_OUTPUTS/namespace)

          echo "🚀 Deploying backend version: $IMAGE_TAG"
          echo "📍 Environment: $ENVIRONMENT"
          echo "📦 Namespace: $NAMESPACE"

          # Determine values file based on environment
          VALUES_FILE="helm/ecommerce/values-${ENVIRONMENT}.yaml"
          if [ ! -f "$VALUES_FILE" ]; then
            VALUES_FILE="helm/ecommerce/values.yaml"
          fi

          # Deploy backend only (not full app)
          helm upgrade --install ecommerce-backend ./helm/ecommerce \
            --namespace $NAMESPACE \
            --values $VALUES_FILE \
            --set backend.image.repository=$DOCKERHUB_USERNAME/ecommerce-backend \
            --set backend.image.tag=$IMAGE_TAG \
            --set frontend.enabled=false \
            --set database.enabled=false \
            --wait \
            --timeout 5m

          echo "✅ Backend deployment successful!"

      - name: Verify backend deployment
        uses: docker://google/cloud-sdk:alpine
        shell: sh
        run: |
          NAMESPACE=$(cat $CLOUDBEES_OUTPUTS/namespace)

          echo "📊 Checking backend pods..."
          kubectl get pods -n $NAMESPACE -l app=ecommerce-backend

          echo ""
          echo "⏳ Waiting for backend pods to be ready..."
          kubectl wait --for=condition=ready pod \
            -l app=ecommerce-backend \
            -n $NAMESPACE \
            --timeout=300s

          echo "✅ Backend is running!"

      - name: Test backend health
        uses: docker://google/cloud-sdk:alpine
        shell: sh
        run: |
          NAMESPACE=$(cat $CLOUDBEES_OUTPUTS/namespace)

          echo "🏥 Testing backend health endpoint..."

          # Get backend service name
          BACKEND_POD=$(kubectl get pod -n $NAMESPACE -l app=ecommerce-backend -o jsonpath='{.items[0].metadata.name}')

          # Test health endpoint
          kubectl exec -n $NAMESPACE $BACKEND_POD -- wget -qO- http://localhost:5000/health || echo "Health check skipped"

          echo "✅ Backend health check complete!"
